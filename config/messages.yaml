# User-facing text for HammerspoonWorkMode.
# Use \n inside a value when a screen line break is needed.

overlay:
  title: "RESEARCH MODE"
  subtitle: "Return to writing, reading, coding, or analysis."
  remaining_prefix: "Remaining: "
  idle: "Idle"
  active_countdown_prefix: "Active countdown: "
  fallback_message: "Return to research work."
  fallback_reason: "Off-task behavior detected."
  block_suffix: "BLOCK"

terminal_guard:
