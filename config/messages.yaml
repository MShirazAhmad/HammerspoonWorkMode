  state_reason:
    allow: "Terminal allowed for research work."
    block: "Terminal blocked after non-research confirmation."
    inactive_allow: "Terminal allowed because BLOCK mode is inactive."
  alert:
    allow: "Terminal allowed for 30 minutes"
    block: "Terminal blocked for 30 minutes"

shell:
  awaiting_confirmation: "Awaiting BLOCK mode terminal confirmation."
  blocked_default: "Blocked by BLOCK mode terminal check"
  decision_required: "Decision required before terminal commands are allowed."
  decision_expired: "Decision window expired. Please answer the BLOCK mode prompt."
  command_blocked:
    title: "Command blocked"
    detail: "{detail} (remaining: {remaining})"
  allowed_status: "Terminal allowed by Y selection (remaining: {remaining})"
