<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Neon frame overlay sample</title>
  <desc id="desc">A single transparent dark rectangle with red, orange, magenta, and blue neon glowing borders.</desc>
  <defs>
    <linearGradient id="frameStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff3b00"/>
      <stop offset="0.18" stop-color="#ffef35"/>
      <stop offset="0.48" stop-color="#ff1919"/>
      <stop offset="0.78" stop-color="#ff27d4"/>
      <stop offset="1" stop-color="#6edcff"/>
    </linearGradient>
    <filter id="neonGlow" x="-60%" y="-80%" width="220%" height="260%">
      <feGaussianBlur stdDeviation="5" result="tight"/>
      <feGaussianBlur stdDeviation="18" result="wide"/>
      <feColorMatrix in="wide" type="matrix" values="1 0 0 0 0.7  0 1 0 0 0.05  0 0 1 0 0.04  0 0 0 1 0" result="warm"/>
      <feMerge>
        <feMergeNode in="warm"/>
        <feMergeNode in="tight"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="edgeBloom" cx="50%" cy="50%" r="58%">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.72" stop-color="#120008" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#ff1a1a" stop-opacity="0.30"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="#020202" fill-opacity="0.78"/>
  <rect width="1920" height="1080" fill="url(#edgeBloom)"/>

  <g filter="url(#neonGlow)">
    <rect x="405" y="285" width="1110" height="510" rx="18" fill="#030303" fill-opacity="0.30" stroke="url(#frameStroke)" stroke-width="16"/>
    <rect x="421" y="301" width="1078" height="478" rx="8" fill="none" stroke="#ffffff" stroke-opacity="0.30" stroke-width="2"/>
  </g>

  <text x="960" y="885" fill="#ffdddd" fill-opacity="0.86" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="38" font-weight="700" text-anchor="middle">TERMINAL CHECK</text>
  <text x="960" y="938" fill="#ff9d9d" fill-opacity="0.78" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" text-anchor="middle">Y allow research terminal · N block commands</text>
</svg>
