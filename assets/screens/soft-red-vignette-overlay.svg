<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Full-screen red corner glow overlay sample</title>
  <desc id="desc">A transparent center with red warning glows concentrated in each corner and fading toward the middle.</desc>
  <defs>
    <radialGradient id="cornerGlow" cx="0" cy="0" r="1">
      <stop offset="0" stop-color="#ff1717" stop-opacity="0.95"/>
      <stop offset="0.18" stop-color="#ff1717" stop-opacity="0.72"/>
      <stop offset="0.42" stop-color="#b80000" stop-opacity="0.30"/>
      <stop offset="0.68" stop-color="#6b0000" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff1717" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#ff1717" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="leftEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff1717" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ff1717" stop-opacity="0"/>
    </linearGradient>
    <filter id="softBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
  </defs>

  <g filter="url(#softBlur)">
    <circle cx="0" cy="0" r="760" fill="url(#cornerGlow)"/>
    <circle cx="1920" cy="0" r="760" fill="url(#cornerGlow)" transform="rotate(90 1920 0)"/>
    <circle cx="0" cy="1080" r="760" fill="url(#cornerGlow)" transform="rotate(-90 0 1080)"/>
    <circle cx="1920" cy="1080" r="760" fill="url(#cornerGlow)" transform="rotate(180 1920 1080)"/>
  </g>

  <rect x="0" y="0" width="1920" height="230" fill="url(#topEdge)"/>
  <rect x="0" y="850" width="1920" height="230" fill="url(#topEdge)" transform="rotate(180 960 965)"/>
  <rect x="0" y="0" width="260" height="1080" fill="url(#leftEdge)"/>
  <rect x="1660" y="0" width="260" height="1080" fill="url(#leftEdge)" transform="rotate(180 1790 540)"/>
</svg>
