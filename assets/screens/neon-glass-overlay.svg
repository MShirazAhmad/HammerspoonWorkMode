<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Neon glass full-screen overlay sample</title>
  <desc id="desc">Transparent dark glass panels with cyan neon outlines and magenta glow, inspired by a control overlay.</desc>
  <defs>
    <pattern id="checker" width="36" height="36" patternUnits="userSpaceOnUse">
      <rect width="18" height="18" fill="#0b0710" fill-opacity="0.28"/>
      <rect x="18" y="18" width="18" height="18" fill="#0b0710" fill-opacity="0.28"/>
    </pattern>
    <radialGradient id="magentaGlow" cx="35%" cy="30%" r="70%">
      <stop offset="0" stop-color="#ff4dff" stop-opacity="0.48"/>
      <stop offset="0.38" stop-color="#9d38ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#100018" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glassFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3c124f" stop-opacity="0.34"/>
      <stop offset="0.55" stop-color="#141a44" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#080812" stop-opacity="0.38"/>
    </linearGradient>
    <filter id="outerGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.02  0 0 0 0 0.5  0 0 0 0 1  0 0 0 1 0" result="blue"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="tight"/>
      <feMerge>
        <feMergeNode in="blue"/>
        <feMergeNode in="tight"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="pinkBloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#030409"/>
  <rect width="1920" height="1080" fill="url(#checker)"/>
  <rect width="1920" height="1080" fill="url(#magentaGlow)" opacity="0.72"/>

  <g filter="url(#pinkBloom)" opacity="0.62">
    <circle cx="260" cy="285" r="260" fill="#ff3cff"/>
    <circle cx="805" cy="340" r="260" fill="#9a42ff"/>
    <circle cx="1410" cy="330" r="290" fill="#ff38d4"/>
    <circle cx="960" cy="840" r="340" fill="#392fff"/>
  </g>

  <g filter="url(#outerGlow)" stroke-linejoin="round">
    <rect x="135" y="150" width="520" height="110" rx="45" fill="url(#glassFill)" stroke="#29d8ff" stroke-width="8"/>
    <circle cx="335" cy="515" r="210" fill="url(#glassFill)" stroke="#37d9ff" stroke-width="6"/>
    <rect x="765" y="150" width="520" height="350" rx="42" fill="url(#glassFill)" stroke="#32d7ff" stroke-width="7"/>
    <rect x="765" y="585" width="520" height="140" rx="42" fill="url(#glassFill)" stroke="#27d7ff" stroke-width="7"/>
    <rect x="1390" y="150" width="345" height="575" rx="45" fill="url(#glassFill)" stroke="#2bd7ff" stroke-width="7"/>
  </g>

  <g fill="none" stroke="#ff4dff" stroke-width="4" opacity="0.75" filter="url(#outerGlow)">
    <path d="M150 175 C230 120 450 135 630 165"/>
    <path d="M785 180 C900 125 1090 140 1260 175"/>
    <path d="M1420 185 C1515 125 1645 130 1720 185"/>
  </g>

  <text x="960" y="885" fill="#dff8ff" fill-opacity="0.94" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="48" font-weight="700" text-anchor="middle">TERMINAL CHECK</text>
  <text x="960" y="945" fill="#91ecff" fill-opacity="0.88" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" text-anchor="middle">Y allow research terminal · N block commands</text>
</svg>
